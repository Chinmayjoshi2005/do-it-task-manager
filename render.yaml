services:
  - type: web
    name: do-it-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn taskmanager.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: do-it-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-vercel-app-url.vercel.app" # The user will need to update this

databases:
  - name: do-it-db
    databaseName: taskmanager
    user: taskmanager_user
